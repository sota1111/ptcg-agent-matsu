name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The cabt engine (cg/) and card data (data/) are license-restricted
      # and gitignored, so CI runs the engine-independent subset:
      # forbidden-term lint (card-name check self-skips without data/),
      # syntax check, and unit tests (engine tests self-skip).
      - run: bash scripts/check.sh
